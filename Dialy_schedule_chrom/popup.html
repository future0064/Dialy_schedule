<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Schedule</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1><span>📋</span> <span id="appTitle"></span></h1>
    <div class="lang-switcher" id="langSwitcher">
      <button class="lang-btn" id="langBtn">
        <span id="langFlag"></span>
        <span id="langName"></span>
        <span class="arrow">▾</span>
      </button>
      <div class="lang-dropdown" id="langDropdown"></div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="nav-bar">
    <button class="nav-btn" id="prevBtn"></button>
    <div class="date-display">
      <div class="date-main" id="dateMain"></div>
      <div class="date-sub"  id="dateSub"></div>
    </div>
    <button class="nav-btn" id="nextBtn"></button>
  </div>

  <!-- Progress -->
  <div class="progress-card">
    <div class="progress-stats">
      <div class="stat">
        <div class="num" id="statTotal">0</div>
        <div class="label" id="labelTotal"></div>
      </div>
      <div class="stat">
        <div class="num done" id="statDone">0</div>
        <div class="label" id="labelDone"></div>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
      </div>
      <div class="progress-pct" id="progressPct">0%</div>
    </div>
  </div>

  <!-- Add task -->
  <div class="add-area" id="addArea">
    <div class="add-row">
      <input class="add-input" id="taskInput" maxlength="100">
      <select class="priority-select" id="prioritySelect"></select>
      <button class="add-btn" id="addBtn"></button>
    </div>
    <button class="copy-btn" id="copyYesterdayBtn"></button>
  </div>

  <!-- Task list -->
  <div class="task-card">
    <div class="task-card-header">
      <span id="listLabel"></span>
      <span id="sortHint" style="font-size:11px;cursor:pointer;color:var(--primary)"></span>
    </div>
    <ul class="task-list" id="taskList"></ul>
  </div>

  <!-- History -->
  <div class="history-panel">
    <div class="history-header" id="historyHeader">
      <span id="historyTitle"></span>
      <span class="history-toggle" id="historyToggle">▾</span>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<script src="js/i18n.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
